version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: itworks-backend-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - itworks-backend-es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: itworks-backend-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  postgres:
    image: postgres:16
    container_name: itworks-backend-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@123
      POSTGRES_DB: recruitment_db
    ports:
      - "5432:5432"
    volumes:
      - itworks-backend-pg-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: itworks-backend-redis
    ports:
      - "6379:6379"
    volumes:
      - itworks-backend-redis-data:/data

volumes:
  itworks-backend-es-data:
  itworks-backend-pg-data:
  itworks-backend-redis-data:
